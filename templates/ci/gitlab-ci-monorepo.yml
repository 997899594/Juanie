stages:
  - detect
  - build

variables:
  REGISTRY: $CI_REGISTRY

detect:
  stage: detect
  image: oven/bun:1
  script:
    - |
      set -euo pipefail

      bun add -g turbo

      if [ "${JUANIE_FORCE_FULL_BUILD:-0}" = "1" ]; then
        SERVICES=$(
          awk '
            /^services:/ { in_services=1; next }
            in_services && /^[^[:space:]-]/ { exit }
            in_services && /^[[:space:]]*-[[:space:]]*name:/ {
              sub(/^[[:space:]]*-[[:space:]]*name:[[:space:]]*/, "", $0)
              gsub(/["'\'']/,"",$0)
              print $0
            }
          ' juanie.yaml \
            | sed 's/"/\\"/g; s/.*/"&"/' \
            | paste -sd, -
        )
        if [ -n "${SERVICES}" ]; then
          SERVICES="[${SERVICES}]"
        else
          SERVICES='[]'
        fi
      else
        SERVICES=$(turbo ls --filter="...[$CI_COMMIT_BEFORE_SHA]" --json 2>/dev/null || echo '[]')
      fi

      echo "SERVICES=$SERVICES" >> build.env
  artifacts:
    reports:
      dotenv: build.env

build:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  before_script:
    - apk add --no-cache curl jq
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - |
      set -euo pipefail

      SOURCE_SHA="${JUANIE_SOURCE_SHA:-$CI_COMMIT_SHA}"
      RELEASE_REF="${JUANIE_RELEASE_REF:-$CI_COMMIT_REF_NAME}"

      for SERVICE in $(echo $SERVICES | jq -r '.[]'); do
        IMAGE_TAG=$CI_REGISTRY_IMAGE/$SERVICE:sha-$SOURCE_SHA

        if [ -f docker-bake.hcl ]; then
          # 使用 docker-bake.hcl，Juanie 覆盖 tag
          docker buildx bake $SERVICE \
            --set ${SERVICE}.tags=${IMAGE_TAG} \
            --set ${SERVICE}.args.GIT_SHA=${SOURCE_SHA} \
            --push
        else
          # 回退到标准 Dockerfile
          docker build -t $IMAGE_TAG -f apps/$SERVICE/Dockerfile .
          docker push $IMAGE_TAG
        fi

        RELEASE_RESPONSE_FILE="$(mktemp)"
        RELEASE_STATUS=$(curl -sS -o "$RELEASE_RESPONSE_FILE" -w '%{http_code}' -X POST "https://juanie.art/api/releases" \
          -H "Content-Type: application/json" \
          -H "Authorization: Bearer $CI_JOB_TOKEN" \
          -d "{
            \"repository\": \"$CI_PROJECT_PATH\",
            \"sha\": \"$SOURCE_SHA\",
            \"ref\": \"$RELEASE_REF\",
            \"services\": [
              {
                \"name\": \"$SERVICE\",
                \"image\": \"$IMAGE_TAG\"
              }
            ]
          }")
        RELEASE_RESPONSE="$(cat "$RELEASE_RESPONSE_FILE")"
        rm -f "$RELEASE_RESPONSE_FILE"

        echo "$RELEASE_RESPONSE"

        if [ "$RELEASE_STATUS" -lt 200 ] || [ "$RELEASE_STATUS" -ge 300 ]; then
          echo "Juanie release request failed with HTTP ${RELEASE_STATUS}"
          exit 1
        fi

        RELEASE_ID=$(printf '%s' "$RELEASE_RESPONSE" | jq -r '.release.id')
        RELEASE_PATH=$(printf '%s' "$RELEASE_RESPONSE" | jq -r '.release.releasePath // empty')
        if [ -z "$RELEASE_ID" ] || [ "$RELEASE_ID" = "null" ]; then
          echo "Juanie did not return a release id"
          echo "$RELEASE_RESPONSE"
          exit 1
        fi

        for attempt in $(seq 1 180); do
          STATUS_RESPONSE=$(curl -fsS "https://juanie.art/api/releases/${RELEASE_ID}/status" \
            -H "Authorization: Bearer $CI_JOB_TOKEN")

          RESOLUTION=$(printf '%s' "$STATUS_RESPONSE" | jq -r '.release.resolution')
          STATUS=$(printf '%s' "$STATUS_RESPONSE" | jq -r '.release.status')
          ERROR_MESSAGE=$(printf '%s' "$STATUS_RESPONSE" | jq -r '.release.error // empty')

          echo "Juanie release ${RELEASE_ID}: status=${STATUS}"

          case "$RESOLUTION" in
            succeeded)
              break
              ;;
            action_required)
              if [ -n "$RELEASE_PATH" ]; then
                echo "Juanie release requires manual action: https://juanie.art${RELEASE_PATH}"
              fi
              break
              ;;
            failed)
              echo "Juanie release failed: ${ERROR_MESSAGE:-unknown error}"
              exit 1
              ;;
          esac

          sleep 10
        done
      done
  rules:
    - if: $SERVICES != '[]'
