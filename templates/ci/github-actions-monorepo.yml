name: Juanie CI

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      juanie_source_sha:
        description: Source commit SHA to build
        required: false
        type: string
      juanie_release_ref:
        description: Logical release ref to send back to Juanie
        required: false
        type: string
      juanie_force_full_build:
        description: Build all services for preview startup
        required: false
        type: string

env:
  IMAGE_REGISTRY: ghcr.io
  JUANIE_SOURCE_SHA: ${{ inputs.juanie_source_sha || github.sha }}
  JUANIE_RELEASE_REF: ${{ inputs.juanie_release_ref || github.ref }}
  JUANIE_FORCE_FULL_BUILD: ${{ inputs.juanie_force_full_build || 'false' }}

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.detect.outputs.services }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.JUANIE_SOURCE_SHA }}

      - uses: oven-sh/setup-bun@v1

      - name: Setup Turborepo
        run: bun add -g turbo

      - name: Detect affected services
        id: detect
        run: |
          set -euo pipefail

          if [ "${JUANIE_FORCE_FULL_BUILD}" = "true" ]; then
            SERVICES=$(
              awk '
                /^services:/ { in_services=1; next }
                in_services && /^[^[:space:]-]/ { exit }
                in_services && /^[[:space:]]*-[[:space:]]*name:/ {
                  sub(/^[[:space:]]*-[[:space:]]*name:[[:space:]]*/, "", $0)
                  gsub(/["'\'']/,"",$0)
                  print $0
                }
              ' juanie.yaml \
                | sed 's/"/\\"/g; s/.*/"&"/' \
                | paste -sd, -
            )
            if [ -n "${SERVICES}" ]; then
              SERVICES="[${SERVICES}]"
            else
              SERVICES='[]'
            fi
          else
            SERVICES=$(turbo ls --filter="...[origin/main^1]" --json 2>/dev/null || echo '[]')
          fi

          echo "services=$SERVICES" >> $GITHUB_OUTPUT

  build:
    needs: detect
    if: ${{ needs.detect.outputs.services != '[]' }}
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect.outputs.services) }}
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.JUANIE_SOURCE_SHA }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        run: |
          export REGISTRY="${{ env.IMAGE_REGISTRY }}"
          IMAGE_TAG=${REGISTRY}/${{ github.repository }}/${{ matrix.service }}:sha-${{ env.JUANIE_SOURCE_SHA }}

          if [ -f docker-bake.hcl ]; then
            # 使用 docker-bake.hcl，Juanie 覆盖 tag
            docker buildx bake ${{ matrix.service }} \
              --set ${{ matrix.service }}.tags=${IMAGE_TAG} \
              --set ${{ matrix.service }}.args.GIT_SHA=${{ env.JUANIE_SOURCE_SHA }} \
              --push
          else
            # 回退到标准 Dockerfile
            docker build -t $IMAGE_TAG -f apps/${{ matrix.service }}/Dockerfile .
            docker push $IMAGE_TAG
          fi

      - name: Trigger Juanie Release
        if: success()
        run: |
          IMAGE_TAG=${{ env.IMAGE_REGISTRY }}/${{ github.repository }}/${{ matrix.service }}:sha-${{ env.JUANIE_SOURCE_SHA }}
          RELEASE_RESPONSE_FILE="$(mktemp)"
          RELEASE_STATUS=$(curl -sS -o "$RELEASE_RESPONSE_FILE" -w '%{http_code}' -X POST "https://juanie.art/api/releases" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -d '{
              "repository": "${{ github.repository }}",
              "sha": "${{ env.JUANIE_SOURCE_SHA }}",
              "ref": "${{ env.JUANIE_RELEASE_REF }}",
              "services": [
                {
                  "name": "${{ matrix.service }}",
                  "image": "'"$IMAGE_TAG"'"
                }
              ]
            }')
          RELEASE_RESPONSE="$(cat "$RELEASE_RESPONSE_FILE")"
          rm -f "$RELEASE_RESPONSE_FILE"

          echo "$RELEASE_RESPONSE"

          if [ "$RELEASE_STATUS" -lt 200 ] || [ "$RELEASE_STATUS" -ge 300 ]; then
            echo "Juanie release request failed with HTTP ${RELEASE_STATUS}"
            exit 1
          fi

          RELEASE_ID=$(printf '%s' "$RELEASE_RESPONSE" | jq -r '.release.id')
          RELEASE_PATH=$(printf '%s' "$RELEASE_RESPONSE" | jq -r '.release.releasePath // empty')
          if [ -z "$RELEASE_ID" ] || [ "$RELEASE_ID" = "null" ]; then
            echo "Juanie did not return a release id"
            echo "$RELEASE_RESPONSE"
            exit 1
          fi

          for attempt in $(seq 1 180); do
            STATUS_RESPONSE=$(curl -fsS "https://juanie.art/api/releases/${RELEASE_ID}/status" \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}")

            RESOLUTION=$(printf '%s' "$STATUS_RESPONSE" | jq -r '.release.resolution')
            STATUS=$(printf '%s' "$STATUS_RESPONSE" | jq -r '.release.status')
            ERROR_MESSAGE=$(printf '%s' "$STATUS_RESPONSE" | jq -r '.release.error // empty')

            echo "Juanie release ${RELEASE_ID}: status=${STATUS}"

            case "$RESOLUTION" in
              succeeded)
                exit 0
                ;;
              action_required)
                if [ -n "$RELEASE_PATH" ]; then
                  echo "Juanie release requires manual action: https://juanie.art${RELEASE_PATH}"
                fi
                exit 0
                ;;
              failed)
                echo "Juanie release failed: ${ERROR_MESSAGE:-unknown error}"
                exit 1
                ;;
            esac

            sleep 10
          done

          echo "Timed out waiting for Juanie release ${RELEASE_ID}"
          exit 1
