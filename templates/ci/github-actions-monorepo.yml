name: Juanie CI

on:
  push:
    branches: [main, master]

env:
  REGISTRY: ghcr.io

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.detect.outputs.services }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v1

      - name: Setup Turborepo
        run: bun add -g turbo

      - name: Detect affected services
        id: detect
        run: |
          AFFECTED=$(turbo ls --filter="...[origin/main^1]" --json 2>/dev/null || echo '[]')
          echo "services=$AFFECTED" >> $GITHUB_OUTPUT

  build:
    needs: detect
    if: ${{ needs.detect.outputs.services != '[]' }}
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect.outputs.services) }}
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        run: |
          IMAGE_TAG=${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.service }}:sha-${{ github.sha }}

          if [ -f docker-bake.hcl ]; then
            # 使用 docker-bake.hcl，Juanie 覆盖 tag
            docker buildx bake ${{ matrix.service }} \
              --set ${{ matrix.service }}.tags=${IMAGE_TAG} \
              --push
          else
            # 回退到标准 Dockerfile
            docker build -t $IMAGE_TAG -f apps/${{ matrix.service }}/Dockerfile .
            docker push $IMAGE_TAG
          fi

      - name: Trigger Juanie Release
        if: success()
        run: |
          IMAGE_TAG=${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.service }}:sha-${{ github.sha }}
          curl -fsSX POST "https://juanie.art/api/releases" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -d '{
              "repository": "${{ github.repository }}",
              "sha": "${{ github.sha }}",
              "ref": "${{ github.ref }}",
              "services": [
                {
                  "name": "${{ matrix.service }}",
                  "image": "'"$IMAGE_TAG"'"
                }
              ]
            }'
