name: Juanie CI

on:
  push:
    branches: [main, master]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  IMAGE_TAG: ghcr.io/${{ github.repository }}:sha-${{ github.sha }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push (Bake)
        if: ${{ hashFiles('docker-bake.hcl', 'docker-bake.json') != '' }}
        uses: docker/bake-action@v5
        with:
          push: true
          set: |
            *.tags=${{ env.IMAGE_TAG }}
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max

      - name: Build and Push (Dockerfile)
        if: ${{ hashFiles('docker-bake.hcl', 'docker-bake.json') == '' && hashFiles('Dockerfile') != '' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push (Buildpacks)
        if: ${{ hashFiles('docker-bake.hcl', 'docker-bake.json') == '' && hashFiles('Dockerfile') == '' }}
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v $PWD:/workspace \
            -w /workspace \
            buildpacksio/pack \
            pack build ${{ env.IMAGE_TAG }} --builder paketobuildpacks/builder-jammy-full --publish

      - name: Trigger Juanie Release
        if: success()
        run: |
          RELEASE_RESPONSE=$(curl -fsSX POST "https://juanie.art/api/releases" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -d '{
              "repository": "${{ github.repository }}",
              "sha": "${{ github.sha }}",
              "ref": "${{ github.ref }}",
              "services": {{RELEASE_SERVICES_JSON}}
            }')

          RELEASE_ID=$(printf '%s' "$RELEASE_RESPONSE" | jq -r '.release.id')
          if [ -z "$RELEASE_ID" ] || [ "$RELEASE_ID" = "null" ]; then
            echo "Juanie did not return a release id"
            echo "$RELEASE_RESPONSE"
            exit 1
          fi

          for attempt in $(seq 1 180); do
            STATUS_RESPONSE=$(curl -fsS "https://juanie.art/api/releases/${RELEASE_ID}/status" \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}")

            TERMINAL=$(printf '%s' "$STATUS_RESPONSE" | jq -r '.release.terminal')
            SUCCEEDED=$(printf '%s' "$STATUS_RESPONSE" | jq -r '.release.succeeded')
            STATUS=$(printf '%s' "$STATUS_RESPONSE" | jq -r '.release.status')
            ERROR_MESSAGE=$(printf '%s' "$STATUS_RESPONSE" | jq -r '.release.error // empty')

            echo "Juanie release ${RELEASE_ID}: status=${STATUS}"

            if [ "$TERMINAL" = "true" ]; then
              if [ "$SUCCEEDED" = "true" ]; then
                exit 0
              fi

              echo "Juanie release failed: ${ERROR_MESSAGE:-unknown error}"
              exit 1
            fi

            sleep 10
          done

          echo "Timed out waiting for Juanie release ${RELEASE_ID}"
          exit 1
