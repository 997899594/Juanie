name: Juanie CI

on:
  push:
    branches: [main, master]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  IMAGE_TAG: ghcr.io/${{ github.repository }}:sha-${{ github.sha }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve Juanie Build Plan
        id: juanie
        run: |
          set -euo pipefail

          ruby <<'RUBY' "$GITHUB_OUTPUT"
          require 'json'
          require 'yaml'

          output_path = ARGV.fetch(0)
          config = YAML.load_file('juanie.yaml') || {}
          services = Array(config['services'])

          raise 'juanie.yaml must define at least one service' if services.empty?

          release_services = services.map do |service|
            name = service['name'].to_s.strip
            raise 'service.name is required' if name.empty?

            {
              name: name,
              image: ENV.fetch('IMAGE_TAG'),
            }
          end

          build_descriptors = services.map do |service|
            build = service['build'] || {}

            {
              'name' => service['name'].to_s,
              'strategy' => (build['strategy'] || 'auto').to_s,
              'context' => (build['context'] || '.').to_s,
              'dockerfile' => build['dockerfile']&.to_s,
              'target' => build['target']&.to_s,
              'definition' => build['definition']&.to_s,
            }
          end

          canonical = build_descriptors.first
          conflicting = build_descriptors.find do |descriptor|
            %w[strategy context dockerfile target definition].any? do |key|
              descriptor[key] != canonical[key]
            end
          end

          if conflicting
            raise(
              "single-repo Juanie CI requires all services to share one build config; conflicting service=#{conflicting['name']}"
            )
          end

          if canonical['definition'].nil? || canonical['definition'].empty?
            canonical['definition'] = './docker-bake.hcl' if File.file?('docker-bake.hcl')
            canonical['definition'] ||= './docker-bake.json' if File.file?('docker-bake.json')
          end

          if canonical['dockerfile'].nil? || canonical['dockerfile'].empty?
            canonical['dockerfile'] = 'Dockerfile' if File.file?('Dockerfile')
          end

          File.open(output_path, 'a') do |file|
            file.puts('release_services_json<<EOF')
            file.puts(JSON.generate(release_services))
            file.puts('EOF')

            file.puts("build_strategy=#{canonical['strategy']}")
            file.puts("build_context=#{canonical['context']}")
            file.puts("build_dockerfile=#{canonical['dockerfile'] || ''}")
            file.puts("build_target=#{canonical['target'] || ''}")
            file.puts("build_definition=#{canonical['definition'] || ''}")
          end
          RUBY

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Image
        run: |
          set -euo pipefail

          BUILD_STRATEGY="${{ steps.juanie.outputs.build_strategy }}"
          BUILD_DEFINITION="${{ steps.juanie.outputs.build_definition }}"
          BUILD_TARGET="${{ steps.juanie.outputs.build_target }}"
          BUILD_DOCKERFILE="${{ steps.juanie.outputs.build_dockerfile }}"
          BUILD_CONTEXT="${{ steps.juanie.outputs.build_context }}"

          if [ "$BUILD_STRATEGY" = "auto" ]; then
            if [ -n "$BUILD_DEFINITION" ]; then
              BUILD_STRATEGY="bake"
            elif [ -n "$BUILD_DOCKERFILE" ]; then
              BUILD_STRATEGY="dockerfile"
            else
              BUILD_STRATEGY="buildpacks"
            fi
          fi

          case "$BUILD_STRATEGY" in
            bake)
              if [ -n "$BUILD_TARGET" ]; then
                docker buildx bake \
                  --file "$BUILD_DEFINITION" \
                  "$BUILD_TARGET" \
                  --set "$BUILD_TARGET.tags=${{ env.IMAGE_TAG }}" \
                  --set "$BUILD_TARGET.args.GIT_SHA=${{ github.sha }}" \
                  --set "$BUILD_TARGET.cache-from=type=gha" \
                  --set "$BUILD_TARGET.cache-to=type=gha,mode=max" \
                  --push \
                  --progress plain
              else
                docker buildx bake \
                  --file "$BUILD_DEFINITION" \
                  --set "*.tags=${{ env.IMAGE_TAG }}" \
                  --set "*.args.GIT_SHA=${{ github.sha }}" \
                  --set "*.cache-from=type=gha" \
                  --set "*.cache-to=type=gha,mode=max" \
                  --push \
                  --progress plain
              fi
              ;;
            dockerfile)
              docker buildx build \
                --file "$BUILD_DOCKERFILE" \
                --tag "${{ env.IMAGE_TAG }}" \
                --build-arg "GIT_SHA=${{ github.sha }}" \
                --cache-from "type=gha" \
                --cache-to "type=gha,mode=max" \
                --push \
                "$BUILD_CONTEXT"
              ;;
            buildpacks)
              docker run --rm \
                -v /var/run/docker.sock:/var/run/docker.sock \
                -v "$PWD:/workspace" \
                -w /workspace \
                buildpacksio/pack \
                pack build "${{ env.IMAGE_TAG }}" --builder paketobuildpacks/builder-jammy-full --publish
              ;;
            *)
              echo "Unsupported build strategy: $BUILD_STRATEGY"
              exit 1
              ;;
          esac

      - name: Verify Published Image
        if: success()
        run: |
          set -euo pipefail

          deadline=$(( $(date +%s) + 180 ))

          while [ "$(date +%s)" -lt "$deadline" ]; do
            if docker buildx imagetools inspect "${{ env.IMAGE_TAG }}" >/dev/null 2>&1; then
              echo "Published image is available: ${{ env.IMAGE_TAG }}"
              exit 0
            fi

            echo "Waiting for image manifest to become visible: ${{ env.IMAGE_TAG }}"
            sleep 5
          done

          echo "Image manifest was not available in registry before release trigger"
          exit 1

      - name: Trigger Juanie Release
        if: success()
        run: |
          set -euo pipefail

          RELEASE_RESPONSE=$(curl -fsSX POST "https://juanie.art/api/releases" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -d '{
              "repository": "${{ github.repository }}",
              "sha": "${{ github.sha }}",
              "ref": "${{ github.ref }}",
              "services": ${{ steps.juanie.outputs.release_services_json }}
            }')

          RELEASE_ID=$(printf '%s' "$RELEASE_RESPONSE" | jq -r '.release.id')
          if [ -z "$RELEASE_ID" ] || [ "$RELEASE_ID" = "null" ]; then
            echo "Juanie did not return a release id"
            echo "$RELEASE_RESPONSE"
            exit 1
          fi

          RELEASE_PATH=$(printf '%s' "$RELEASE_RESPONSE" | jq -r '.release.releasePath // empty')
          if [ -n "$RELEASE_PATH" ]; then
            echo "Release detail: https://juanie.art${RELEASE_PATH}"
          fi

          for attempt in $(seq 1 180); do
            STATUS_RESPONSE=$(curl -fsS "https://juanie.art/api/releases/${RELEASE_ID}/status" \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}")

            TERMINAL=$(printf '%s' "$STATUS_RESPONSE" | jq -r '.release.terminal')
            SUCCEEDED=$(printf '%s' "$STATUS_RESPONSE" | jq -r '.release.succeeded')
            STATUS=$(printf '%s' "$STATUS_RESPONSE" | jq -r '.release.status')
            STATUS_LABEL=$(printf '%s' "$STATUS_RESPONSE" | jq -r '.release.statusLabel')
            ERROR_MESSAGE=$(printf '%s' "$STATUS_RESPONSE" | jq -r '.release.error // empty')

            echo "Juanie release ${RELEASE_ID}: ${STATUS} (${STATUS_LABEL})"

            if [ "$TERMINAL" = "true" ]; then
              if [ "$SUCCEEDED" = "true" ]; then
                exit 0
              fi

              echo "Juanie release failed: ${ERROR_MESSAGE:-unknown error}"
              exit 1
            fi

            sleep 10
          done

          echo "Timed out waiting for Juanie release ${RELEASE_ID}"
          exit 1
