name: Juanie CI

on:
  push:
    branches: [main, master]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        run: |
          IMAGE_TAG=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}

          if [ -f Dockerfile ]; then
            # 使用 Dockerfile 构建
            docker buildx build --push \
              --tag $IMAGE_TAG \
              --cache-from type=gha \
              --cache-to type=gha,mode=max \
              .
          else
            # 使用 Buildpacks 构建（自动检测语言）
            docker run --rm \
              -v /var/run/docker.sock:/var/run/docker.sock \
              -v $PWD:/workspace \
              -w /workspace \
              buildpacksio/pack \
              pack build $IMAGE_TAG --builder paketobuildpacks/builder-jammy-full
          fi

      - name: Trigger Juanie Deployment
        if: success()
        run: |
          curl -X POST "https://juanie.art/api/deployments/trigger" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -d "{
              \"repository\": \"${{ github.repository }}\",
              \"sha\": \"${{ github.sha }}\",
              \"ref\": \"${{ github.ref }}\",
              \"image\": \"${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}\"
            }"
