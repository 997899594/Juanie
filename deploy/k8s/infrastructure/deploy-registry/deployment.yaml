apiVersion: apps/v1
kind: Deployment
metadata:
  name: deploy-registry
  namespace: juanie
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: deploy-registry
  template:
    metadata:
      labels:
        app.kubernetes.io/name: deploy-registry
    spec:
      containers:
        - name: registry
          image: registry:3.0.0
          ports:
            - containerPort: 5000
          env:
            - name: REGISTRY_HTTP_ADDR
              value: 0.0.0.0:5000
            - name: REGISTRY_STORAGE_FILESYSTEM_ROOTDIRECTORY
              value: /var/lib/registry
            - name: REGISTRY_STORAGE_DELETE_ENABLED
              value: 'true'
            - name: REGISTRY_AUTH
              value: htpasswd
            - name: REGISTRY_AUTH_HTPASSWD_REALM
              value: Juanie Deploy Registry
            - name: REGISTRY_AUTH_HTPASSWD_PATH
              value: /auth/htpasswd
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: registry-data
              mountPath: /var/lib/registry
            - name: registry-auth
              mountPath: /auth
              readOnly: true
      volumes:
        - name: registry-data
          persistentVolumeClaim:
            claimName: deploy-registry-data
        - name: registry-auth
          secret:
            secretName: deploy-registry-auth
