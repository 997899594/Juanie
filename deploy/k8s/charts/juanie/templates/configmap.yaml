apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Chart.Name }}-config
  namespace: {{ .Values.namespace }}
data:
  NODE_ENV: {{ .Values.env.NODE_ENV | quote }}
  PORT: {{ .Values.env.PORT | quote }}
  REDIS_HOST: {{ .Values.env.REDIS_HOST | quote }}
  REDIS_PORT: {{ .Values.env.REDIS_PORT | quote }}
  DATABASE_HOST: {{ .Values.env.DATABASE_HOST | quote }}
  DATABASE_PORT: {{ .Values.env.DATABASE_PORT | quote }}
  DATABASE_NAME: {{ .Values.env.DATABASE_NAME | quote }}
  DATABASE_USER: {{ .Values.env.DATABASE_USER | default "postgres" | quote }}
  DATABASE_SSL_MODE: {{ .Values.env.DATABASE_SSL_MODE | default "disable" | quote }}
  AUTH_TRUST_HOST: {{ .Values.env.AUTH_TRUST_HOST | default "true" | quote }}
  JUANIE_BASE_DOMAIN: {{ .Values.env.JUANIE_BASE_DOMAIN | default "juanie.art" | quote }}
  JUANIE_ARGOCD_NAMESPACE: {{ .Values.env.JUANIE_ARGOCD_NAMESPACE | default "argocd" | quote }}
  JUANIE_ARGOCD_PROJECT: {{ .Values.env.JUANIE_ARGOCD_PROJECT | default "juanie" | quote }}
  JUANIE_ARGOCD_DESTINATION_SERVER: {{ .Values.env.JUANIE_ARGOCD_DESTINATION_SERVER | default "https://kubernetes.default.svc" | quote }}
  JUANIE_PREVIEW_APPLICATIONSET_ENABLED: {{ .Values.env.JUANIE_PREVIEW_APPLICATIONSET_ENABLED | default "true" | quote }}
  JUANIE_PREVIEW_APPLICATIONSET_REPO_URL: {{ .Values.env.JUANIE_PREVIEW_APPLICATIONSET_REPO_URL | default "" | quote }}
  JUANIE_PREVIEW_APPLICATIONSET_TARGET_REVISION: {{ .Values.env.JUANIE_PREVIEW_APPLICATIONSET_TARGET_REVISION | default "main" | quote }}
  JUANIE_PREVIEW_APPLICATIONSET_PATH: {{ .Values.env.JUANIE_PREVIEW_APPLICATIONSET_PATH | default "deploy/k8s/charts/preview-scaffold" | quote }}
  AI_ENABLED: {{ .Values.env.AI_ENABLED | default "false" | quote }}
  AI_302_BASE_URL: {{ .Values.env.AI_302_BASE_URL | default "https://api.302.ai/v1" | quote }}
  AI_DEFAULT_PLAN: {{ .Values.env.AI_DEFAULT_PLAN | default "free" | quote }}
  AI_MODEL: {{ .Values.env.AI_MODEL | default "gpt-5.2" | quote }}
  AI_MODEL_PRO: {{ .Values.env.AI_MODEL_PRO | default "gpt-5.2-pro" | quote }}
  AI_MODEL_TOOL: {{ .Values.env.AI_MODEL_TOOL | default "gpt-5.2" | quote }}
  JUANIE_NAMESPACE: {{ .Values.namespace | quote }}
  SCHEMA_RUNNER_IMAGE_REPOSITORY: {{ .Values.images.schemaRunner.repository | quote }}
  SCHEMA_RUNNER_IMAGE_TAG: {{ .Values.images.schemaRunner.tag | quote }}
