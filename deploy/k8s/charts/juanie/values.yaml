# 默认配置（开发环境）
images:
  web:
    repository: ghcr.io/997899594/juanie
    pullPolicy: IfNotPresent
    tag: "web-sha-f12feba"
  worker:
    repository: ghcr.io/997899594/juanie
    pullPolicy: IfNotPresent
    tag: "worker-sha-f12feba"
  schemaRunner:
    repository: ghcr.io/997899594/juanie
    pullPolicy: IfNotPresent
    tag: "schema-runner-sha-f12feba"

imagePullSecrets: []

namespace: juanie

# 副本数
replicaCount:
  web: 1
  worker: 1
  scheduler: 1

deployment:
  progressDeadlineSeconds: 900
  revisionHistoryLimit: 5
  web:
    strategy:
      type: RollingUpdate
      maxSurge: 0
      maxUnavailable: 1
  worker:
    strategy:
      type: RollingUpdate
      maxSurge: 0
      maxUnavailable: 1
  scheduler:
    strategy:
      type: Recreate

# 资源配置
resources:
  web:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  worker:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  scheduler:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

# 环境变量（非敏感）
env:
  NODE_ENV: "production"
  PORT: 3001
  REDIS_HOST: "redis"
  REDIS_PORT: 6379
  DATABASE_HOST: "postgres"
  DATABASE_PORT: 5432
  DATABASE_NAME: "juanie"
  DATABASE_USER: "postgres"
  DATABASE_SSL_MODE: "disable"
  AUTH_TRUST_HOST: "true"
  JUANIE_BASE_DOMAIN: "juanie.art"
  JUANIE_ARGOCD_NAMESPACE: "argocd"
  JUANIE_ARGOCD_PROJECT: "juanie"
  JUANIE_ARGOCD_DESTINATION_SERVER: "https://kubernetes.default.svc"
  JUANIE_PREVIEW_APPLICATIONSET_ENABLED: "true"
  JUANIE_PREVIEW_APPLICATIONSET_REPO_URL: ""
  JUANIE_PREVIEW_APPLICATIONSET_TARGET_REVISION: "main"
  JUANIE_PREVIEW_APPLICATIONSET_PATH: "deploy/k8s/charts/preview-scaffold"
  AI_302_BASE_URL: "https://api.302.ai/v1"
  AI_DEFAULT_PLAN: "free"
  AI_MODEL: "gpt-5.2"
  AI_MODEL_PRO: "gpt-5.2-pro"
  AI_MODEL_TOOL: "gpt-5.2"

# Gateway 配置
hostname: "juanie.art"

# 数据库配置
postgres:
  image: "pgvector/pgvector:pg16"
  storage: "10Gi"

redis:
  storage: "1Gi"

# 敏感配置
secret:
  existingSecret: "juanie-secret"
  databasePassword: ""
  nextauthSecret: ""
  githubClientId: ""
  githubClientSecret: ""
  gitlabClientId: ""
  gitlabClientSecret: ""
  ai302ApiKey: ""
