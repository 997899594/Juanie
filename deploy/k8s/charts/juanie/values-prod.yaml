# 生产环境覆盖配置
replicaCount:
  web: 1
  worker: 1

deployment:
  progressDeadlineSeconds: 1200
  revisionHistoryLimit: 3
  web:
    strategy:
      type: RollingUpdate
      maxSurge: 0
      maxUnavailable: 1
  worker:
    strategy:
      type: RollingUpdate
      maxSurge: 0
      maxUnavailable: 1

resources:
  web:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi
