# 生产环境覆盖配置
replicaCount:
  web: 2
  worker: 1
  scheduler: 1

deployment:
  progressDeadlineSeconds: 1200
  revisionHistoryLimit: 3
  web:
    strategy:
      type: RollingUpdate
      maxSurge: 1
      maxUnavailable: 0
  worker:
    strategy:
      type: RollingUpdate
      maxSurge: 1
      maxUnavailable: 0
  scheduler:
    strategy:
      type: Recreate

resources:
  web:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  worker:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  scheduler:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi
