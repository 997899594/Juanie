{{- if .Values.enableStableRoutes }}
{{- range .Values.domains }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .routeName }}
  namespace: {{ $.Values.namespace }}
  labels:
    app.kubernetes.io/managed-by: juanie
    juanie.dev/runtime: preview-applicationset
    juanie.dev/project-slug: {{ $.Values.projectSlug | quote }}
    juanie.dev/environment-id: {{ $.Values.environmentId | quote }}
    juanie.dev/environment-name: {{ $.Values.environmentName | quote }}
spec:
  parentRefs:
    - name: shared-gateway
      namespace: juanie
      sectionName: https-wildcard
  hostnames:
    - {{ .hostname }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - kind: Service
          name: {{ .serviceName }}
          port: {{ .servicePort }}
---
{{- end }}
{{- end }}
