name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  IMAGE_REGISTRY: ghcr.io
  IMAGE_REPOSITORY: ${{ github.repository_owner }}/juanie
  ATLAS_VERSION: 1.1.0
  ATLAS_ACTION_VERSION: v1.1.0
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - uses: ariga/setup-atlas@v0
        with:
          version: ${{ env.ATLAS_ACTION_VERSION }}

      - run: bun install --frozen-lockfile
      - run: bun run db:hash
      - run: git diff --exit-code -- migrations/atlas.sum
      - run: bun run db:validate
      - run: bunx biome check
      - run: bun run lint
      - run: bun run ai:eval
      - run: bun run test
      - run: bun run build

  build-images:
    needs: quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [web, worker, schema-runner]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build And Push ${{ matrix.target }} Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: ${{ matrix.target }}
          build-args: |
            ATLAS_VERSION=${{ env.ATLAS_VERSION }}
          push: true
          provenance: false
          sbom: false
          tags: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_REPOSITORY }}:${{ matrix.target }}-${{ github.sha }}
          cache-from: type=gha,scope=juanie-docker-${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=juanie-docker-${{ matrix.target }}

  deploy:
    needs: build-images
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: bash .github/scripts/configure-ssh.sh

      - name: Deploy On Server
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          IMAGE_REGISTRY: ${{ env.IMAGE_REGISTRY }}
          IMAGE_REPOSITORY: ${{ env.IMAGE_REPOSITORY }}
        run: bash .github/scripts/deploy.sh
