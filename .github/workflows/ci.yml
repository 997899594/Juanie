name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/juanie

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bunx biome check --write
      - run: bun run lint
      - run: bun run build

  build:
    needs: quality
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      packages: write
      actions: write

    steps:
      - uses: actions/checkout@v4

      - name: 登录 GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 构建并推送镜像
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: 部署到 Kubernetes
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 20m
          script: |
            set -e
            IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"

            dump_rollout_debug() {
              local deployment_name="$1"
              echo "⚠️ Rollout 失败，输出 ${deployment_name} 诊断信息..."
              kubectl describe deployment "${deployment_name}" -n juanie || true
              kubectl get rs -n juanie -l app.kubernetes.io/name=juanie -o wide || true
              kubectl get pods -n juanie -o wide || true
              kubectl get events -n juanie --sort-by=.metadata.creationTimestamp | tail -n 80 || true
            }

            dump_schema_debug() {
              echo "⚠️ Schema 同步失败，输出数据库与应用诊断信息..."
              kubectl get pods -n juanie -o wide || true
              kubectl logs deployment/juanie-web -n juanie --tail=120 || true
              kubectl logs deployment/juanie-worker -n juanie --tail=120 || true
            }

            echo "🚀 部署 Juanie..."
            echo "   镜像: $IMAGE"

            # 1. 更新镜像
            kubectl set image deployment/juanie-web -n juanie juanie=$IMAGE
            kubectl set image deployment/juanie-worker -n juanie worker=$IMAGE

            # 2. 确保 worker 有 NODE_TLS_REJECT_UNAUTHORIZED=0 (for K8s API self-signed certs)
            kubectl set env deployment/juanie-worker -n juanie NODE_TLS_REJECT_UNAUTHORIZED=0

            # 2. 等待滚动更新（新 pod 就绪）
            if ! kubectl rollout status deployment/juanie-web -n juanie --timeout=900s; then
              dump_rollout_debug juanie-web
              exit 1
            fi
            if ! kubectl rollout status deployment/juanie-worker -n juanie --timeout=900s; then
              dump_rollout_debug juanie-worker
              exit 1
            fi

            # 3. 在新 pod 上同步数据库 Schema
            echo "🔄 同步数据库 Schema..."
            if ! kubectl exec -n juanie deployment/juanie-web -- bun run db:push; then
              dump_schema_debug
              exit 1
            fi

            echo "✅ 部署完成!"
