name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/juanie

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bunx biome check --write
      - run: bun run lint
      - run: bun run build

  build:
    needs: quality
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      packages: write
      actions: write

    steps:
      - uses: actions/checkout@v4

      - name: 登录 GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 构建并推送镜像
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: 部署到 Kubernetes
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 20m
          script: |
            set -e
            IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"

            dump_rollout_debug() {
              local deployment_name="$1"
              echo "⚠️ Rollout 失败，输出 ${deployment_name} 诊断信息..."
              kubectl describe deployment "${deployment_name}" -n juanie || true
              kubectl get rs -n juanie -l app.kubernetes.io/name=juanie -o wide || true
              kubectl get pods -n juanie -o wide || true
              kubectl get events -n juanie --sort-by=.metadata.creationTimestamp | tail -n 80 || true
            }

            dump_schema_debug() {
              local job_name="$1"
              echo "⚠️ Schema 同步失败，输出数据库与应用诊断信息..."
              kubectl describe job "${job_name}" -n juanie || true
              kubectl logs job/"${job_name}" -n juanie --tail=200 || true
              kubectl get pods -n juanie -o wide || true
              kubectl logs deployment/juanie-web -n juanie --tail=120 || true
              kubectl logs deployment/juanie-worker -n juanie --tail=120 || true
            }

            echo "🚀 部署 Juanie..."
            echo "   镜像: $IMAGE"
            SCHEMA_JOB="juanie-schema-sync-$(echo '${{ github.sha }}' | cut -c1-7)"

            # 1. 先用新镜像同步 Schema，避免新 web 代码先启动、数据库后迁移
            echo "🔄 先执行 Schema Sync Job..."
            kubectl delete job "${SCHEMA_JOB}" -n juanie --ignore-not-found=true
            kubectl wait --for=delete job/"${SCHEMA_JOB}" -n juanie --timeout=120s || true
            cat <<EOF | kubectl apply -f -
            apiVersion: batch/v1
            kind: Job
            metadata:
              name: ${SCHEMA_JOB}
              namespace: juanie
              labels:
                app.kubernetes.io/name: juanie
                app.kubernetes.io/component: schema-sync
            spec:
              backoffLimit: 0
              ttlSecondsAfterFinished: 600
              template:
                metadata:
                  labels:
                    app.kubernetes.io/name: juanie
                    app.kubernetes.io/component: schema-sync
                spec:
                  restartPolicy: Never
                  serviceAccountName: juanie
                  securityContext:
                    runAsNonRoot: true
                    runAsUser: 1001
                    fsGroup: 1001
                  initContainers:
                    - name: wait-for-postgres
                      image: busybox:1.36
                      command: ['sh', '-c', 'until nc -z postgres 5432; do echo waiting for postgres; sleep 2; done']
                  containers:
                    - name: schema-sync
                      image: ${IMAGE}
                      imagePullPolicy: IfNotPresent
                      command: ['bun', 'run', 'db:push']
                      envFrom:
                        - configMapRef:
                            name: juanie-config
                        - secretRef:
                            name: juanie-secret
                      securityContext:
                        allowPrivilegeEscalation: false
                        capabilities:
                          drop: ["ALL"]
            EOF

            if ! kubectl wait --for=condition=complete job/"${SCHEMA_JOB}" -n juanie --timeout=900s; then
              dump_schema_debug "${SCHEMA_JOB}"
              exit 1
            fi
            kubectl logs job/"${SCHEMA_JOB}" -n juanie --tail=120 || true

            # 2. Schema 成功后再更新镜像并 rollout
            kubectl set image deployment/juanie-web -n juanie juanie=$IMAGE
            kubectl set image deployment/juanie-worker -n juanie worker=$IMAGE

            # 3. 确保 worker 有 NODE_TLS_REJECT_UNAUTHORIZED=0 (for K8s API self-signed certs)
            kubectl set env deployment/juanie-worker -n juanie NODE_TLS_REJECT_UNAUTHORIZED=0

            # 4. 等待滚动更新（新 pod 就绪）
            if ! kubectl rollout status deployment/juanie-web -n juanie --timeout=900s; then
              dump_rollout_debug juanie-web
              exit 1
            fi
            if ! kubectl rollout status deployment/juanie-worker -n juanie --timeout=900s; then
              dump_rollout_debug juanie-worker
              exit 1
            fi

            echo "✅ 部署完成!"
