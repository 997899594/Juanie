name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/juanie

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run build

  build:
    needs: quality
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: 登录 GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 构建并推送镜像
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: 部署到 Kubernetes (Helm Upgrade)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
            CHART_DIR="/root/juanie/deploy/flux/charts/juanie"

            echo "🚀 部署 Juanie..."
            echo "   镜像: $IMAGE"

            # 拉取最新代码 (包含 Helm chart)
            if [ ! -d "/root/juanie" ]; then
              git clone https://github.com/${{ github.repository }}.git /root/juanie
            fi
            cd /root/juanie
            git fetch origin main
            git reset --hard origin/main

            # 同步数据库 Schema (用当前运行的 pod)
            echo "🔄 同步数据库 Schema..."
            kubectl exec -n juanie deployment/juanie-web -- bun run db:push || echo "⚠️ Schema 同步跳过 (可能是首次部署)"
            echo "✅ 数据库 Schema 同步完成!"

            # Helm upgrade (更新配置 + 镜像)
            helm upgrade --install juanie $CHART_DIR \
              -n juanie \
              --create-namespace \
              --set image.tag="${{ github.sha }}" \
              --wait \
              --timeout 300s

            echo "✅ 部署完成!"
