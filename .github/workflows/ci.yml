name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DEPLOY_REGISTRY: ${{ vars.DEPLOY_REGISTRY || 'ghcr.io' }}
  DEPLOY_REGISTRY_PULL_SECRET_NAME: ${{ vars.DEPLOY_REGISTRY_PULL_SECRET_NAME || 'ghcr-pull-secret' }}
  IMAGE_NAME: ${{ github.repository_owner }}/juanie

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile
      - run: bunx biome check --write
      - run: bun run lint
      - run: bun run build

  build:
    needs: quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.DEPLOY_REGISTRY }}
          username: ${{ secrets.DEPLOY_REGISTRY_USERNAME || github.actor }}
          password: ${{ secrets.DEPLOY_REGISTRY_PASSWORD || secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v4

      - name: Build and Push Web Image
        uses: docker/build-push-action@v7
        env:
          BUILDX_NO_DEFAULT_ATTESTATIONS: 1
        with:
          context: .
          file: Dockerfile
          target: web
          push: true
          tags: |
            ${{ env.DEPLOY_REGISTRY }}/${{ env.IMAGE_NAME }}:web-${{ github.sha }}
          provenance: false
          sbom: false

      - name: Build and Push Worker Image
        uses: docker/build-push-action@v7
        env:
          BUILDX_NO_DEFAULT_ATTESTATIONS: 1
        with:
          context: .
          file: Dockerfile
          target: worker
          push: true
          tags: |
            ${{ env.DEPLOY_REGISTRY }}/${{ env.IMAGE_NAME }}:worker-${{ github.sha }}
          provenance: false
          sbom: false

      - name: Build and Push Migrate Image
        uses: docker/build-push-action@v7
        env:
          BUILDX_NO_DEFAULT_ATTESTATIONS: 1
        with:
          context: .
          file: Dockerfile
          target: migrate
          push: true
          tags: |
            ${{ env.DEPLOY_REGISTRY }}/${{ env.IMAGE_NAME }}:migrate-${{ github.sha }}
          provenance: false
          sbom: false

  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: bash .github/scripts/configure-ssh.sh

      - name: Upload Helm Chart
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: bash .github/scripts/upload-chart.sh

      - name: Deploy to Kubernetes
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          DEPLOY_REGISTRY: ${{ env.DEPLOY_REGISTRY }}
          DEPLOY_REGISTRY_PULL_SECRET_NAME: ${{ env.DEPLOY_REGISTRY_PULL_SECRET_NAME }}
        run: bash .github/scripts/deploy.sh
