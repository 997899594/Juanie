name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DEPLOY_REGISTRY: ${{ vars.DEPLOY_REGISTRY || 'ghcr.io' }}
  DEPLOY_REGISTRY_PULL_SECRET_NAME: ${{ vars.DEPLOY_REGISTRY_PULL_SECRET_NAME || 'ghcr-pull-secret' }}
  IMAGE_NAME: ${{ github.repository_owner }}/juanie

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile
      - run: bunx biome check
      - run: bun run lint
      - run: bun run build

  deploy:
    needs: quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: bash .github/scripts/configure-ssh.sh

      - name: Upload Source Bundle
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: bash .github/scripts/upload-source.sh

      - name: Build And Deploy On Server
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          DEPLOY_REGISTRY: ${{ env.DEPLOY_REGISTRY }}
          DEPLOY_REGISTRY_PULL_SECRET_NAME: ${{ env.DEPLOY_REGISTRY_PULL_SECRET_NAME }}
          DEPLOY_REGISTRY_USERNAME: ${{ secrets.DEPLOY_REGISTRY_USERNAME }}
          DEPLOY_REGISTRY_PASSWORD: ${{ secrets.DEPLOY_REGISTRY_PASSWORD }}
        run: bash .github/scripts/deploy.sh
