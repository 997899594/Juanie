name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  DEPLOY_REGISTRY: ghcr.io
  DEPLOY_REGISTRY_PULL_SECRET_NAME: ghcr-pull-secret
  IMAGE_NAME: ${{ github.repository_owner }}/juanie

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile
      - run: bunx biome check
      - run: bun run lint
      - run: bun run build

  deploy:
    needs: quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build And Push Web Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: web
          push: true
          provenance: false
          sbom: false
          tags: ${{ env.DEPLOY_REGISTRY }}/${{ env.IMAGE_NAME }}:web-${{ github.sha }}
          cache-from: type=gha,scope=juanie-docker
          cache-to: type=gha,mode=max,scope=juanie-docker

      - name: Build And Push Worker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: worker
          push: true
          provenance: false
          sbom: false
          tags: ${{ env.DEPLOY_REGISTRY }}/${{ env.IMAGE_NAME }}:worker-${{ github.sha }}
          cache-from: type=gha,scope=juanie-docker
          cache-to: type=gha,mode=max,scope=juanie-docker

      - name: Build And Push Migrate Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: migrate
          push: true
          provenance: false
          sbom: false
          tags: ${{ env.DEPLOY_REGISTRY }}/${{ env.IMAGE_NAME }}:migrate-${{ github.sha }}
          cache-from: type=gha,scope=juanie-docker
          cache-to: type=gha,mode=max,scope=juanie-docker

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: bash .github/scripts/configure-ssh.sh

      - name: Deploy On Server
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          DEPLOY_REGISTRY: ${{ env.DEPLOY_REGISTRY }}
          DEPLOY_REGISTRY_PULL_SECRET_NAME: ${{ env.DEPLOY_REGISTRY_PULL_SECRET_NAME }}
          DEPLOY_REGISTRY_USERNAME: ${{ secrets.DEPLOY_REGISTRY_USERNAME }}
          DEPLOY_REGISTRY_PASSWORD: ${{ secrets.DEPLOY_REGISTRY_PASSWORD }}
        run: bash .github/scripts/deploy.sh
